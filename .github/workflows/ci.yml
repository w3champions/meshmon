name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (check, clippy, test, fmt, openapi drift)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: regenerate OpenAPI snapshot
        run: cargo xtask openapi

      - name: verify OpenAPI snapshot is up to date
        run: |
          if ! git diff --exit-code frontend/src/api/openapi.gen.json; then
            echo "::error ::frontend/src/api/openapi.gen.json is stale — run 'cargo xtask openapi' and commit the result"
            exit 1
          fi

  frontend:
    name: Frontend (biome, type-check, vitest, build, schema drift)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: biome check
        run: npx biome check ./src

      - name: type-check
        run: npm run type-check

      - name: vitest run
        run: npm run test

      - name: npm run build
        run: npm run build

      - name: verify schema.gen.ts is up to date
        run: |
          npm run openapi:types
          if ! git diff --exit-code src/api/schema.gen.ts; then
            echo "::error ::frontend/src/api/schema.gen.ts is stale — run 'cd frontend && npm run openapi:types' and commit the result"
            exit 1
          fi

  release-binary:
    name: Release binary (frontend-embedded)
    runs-on: ubuntu-latest
    needs: [rust, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci (frontend)
        working-directory: frontend
        run: npm ci

      - name: npm run build (frontend)
        working-directory: frontend
        run: npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-binary

      - name: cargo build --release
        run: cargo build --release -p meshmon-service

      - name: Verify real frontend was embedded
        run: |
          # Real SPA includes `<div id="app">` from frontend/index.html.
          # The build.rs placeholder does not — catches a broken npm
          # build step that would otherwise ship a placeholder binary.
          if ! grep -q 'id="app"' frontend/dist/index.html; then
            echo "::error ::frontend/dist/index.html is a placeholder — npm build did not run"
            exit 1
          fi
          SIZE=$(stat -c '%s' target/release/meshmon-service)
          echo "meshmon-service size: ${SIZE} bytes"
          # Sanity floor: a frontend-less meshmon-service is already
          # several MB; with the SPA it grows by the dist size.
          if [ "$SIZE" -lt 2000000 ]; then
            echo "::error ::meshmon-service is unexpectedly small: ${SIZE} bytes"
            exit 1
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: meshmon-service-linux-x86_64
          path: target/release/meshmon-service
          retention-days: 14

  alerts:
    name: Alerts (vmalert-tool unittest + amtool check-config)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run validate-alerts.sh
        # The script sources deploy/versions.env itself; no tag
        # literals live in this workflow.
        run: ./scripts/validate-alerts.sh
