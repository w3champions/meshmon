name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

# Cargo tuning shared by every Rust job.
#
# - CARGO_INCREMENTAL=0 because incremental metadata is invalidated on
#   every restored cache (different source state) and bloats the
#   tarball 2-5x for zero CI benefit.
# - CARGO_PROFILE_DEV_DEBUG=line-tables-only and CODEGEN_UNITS=256
#   shrink dev artifacts and parallelize codegen — wins are tarball
#   transfer time and link parallelism, both CI-relevant.
# - RUSTFLAGS routes the linker through mold (installed per job below).
#   mold is ~3-5x faster than ld for the workspace's larger binaries
#   (meshmon-service, integration test bins).
#
# Compiler caching strategy: Swatinem/rust-cache writes a single tarball
# per shared-key per workflow run, well below GHA's 200 cache-writes/
# minute rate limit. sccache's per-rustc-invocation model was tried and
# regressed against that limit (sccache#2593 + GHA cache rate-limit
# changes from 2026-01-16) — every parallel rustc fan-out tripped the
# limit and silently failed ~40% of writes. Tarball mode trades the
# theoretical per-invocation hit rate for actual writes that land.
env:
  CARGO_INCREMENTAL: "0"
  CARGO_PROFILE_DEV_DEBUG: "line-tables-only"
  CARGO_PROFILE_DEV_CODEGEN_UNITS: "256"
  RUSTFLAGS: "-C link-arg=-fuse-ld=mold"

jobs:
  rust-lint:
    name: Rust lint (fmt, check, clippy, openapi drift)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: clippy, rustfmt

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      # shared-key meshmon-debug is shared with rust-test + rust-e2e so
      # the workspace's debug-profile target/ is restored once and reused
      # across all three. prefix-key v1 invalidates the registry-only
      # tarballs left behind by an earlier sccache experiment whose key
      # collided with this one (GHA cache entries are immutable, so a
      # write under the same key would be silently rejected).
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          shared-key: meshmon-debug
          cache-on-failure: true

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: regenerate OpenAPI snapshot
        run: cargo xtask openapi

      - name: verify OpenAPI snapshot is up to date
        run: |
          if ! git diff --exit-code frontend/src/api/openapi.gen.json; then
            echo "::error ::frontend/src/api/openapi.gen.json is stale — run 'cargo xtask openapi' and commit the result"
            exit 1
          fi

  rust-test:
    name: Rust test (cargo xtask test)
    runs-on: ubuntu-latest
    needs: rust-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          shared-key: meshmon-debug
          cache-on-failure: true

      - name: Install cargo-nextest (prebuilt)
        uses: taiki-e/install-action@nextest

      - name: cargo xtask test
        run: cargo xtask test

  actionlint:
    name: actionlint (workflow YAML)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # rhysd/actionlint publishes only patch tags — no floating v1.
      - name: Run actionlint
        uses: rhysd/actionlint@v1.7.12

  yamllint:
    name: YAML lint (deploy configs)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: yamllint
        # karancode/yamllint-github-action only ships patch tags — no floating v2/v3.
        uses: karancode/yamllint-github-action@v3.0.0
        with:
          yamllint_file_or_dir: "deploy"
          yamllint_strict: true
          yamllint_config_filepath: .yamllint.yml

  shellcheck:
    name: Shellcheck (scripts/*.sh)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          # scandir is non-recursive; scripts/ is flat today.
          # Add additional_files if a nested script or root-level .sh lands.
          scandir: ./scripts
          severity: warning

  frontend:
    name: Frontend (biome, type-check, vitest, build, schema drift)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: biome check
        run: npx biome check ./src

      - name: type-check
        run: npm run type-check

      - name: vitest run
        run: npm run test

      - name: npm run build
        run: npm run build

      - name: verify schema.gen.ts is up to date
        run: |
          npm run openapi:types
          if ! git diff --exit-code src/api/schema.gen.ts; then
            echo "::error ::frontend/src/api/schema.gen.ts is stale — run 'cd frontend && npm run openapi:types' and commit the result"
            exit 1
          fi

  release-binary:
    name: Release binary (frontend-embedded)
    runs-on: ubuntu-latest
    needs: [rust-lint, rust-test, frontend]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci (frontend)
        working-directory: frontend
        run: npm ci

      - name: npm run build (frontend)
        working-directory: frontend
        run: npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"

      - name: Install mold linker
        run: sudo apt-get update && sudo apt-get install -y mold

      # Release-profile artifacts are disjoint from the debug-profile
      # graph (rustc keys include opt-level), so a separate shared-key
      # avoids debug/release tarball cross-contamination.
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          shared-key: meshmon-release
          cache-on-failure: true

      - name: cargo build --release
        run: cargo build --release -p meshmon-service

      - name: Verify real frontend was embedded
        run: |
          # Real SPA includes `<div id="app">` from frontend/index.html.
          # The build.rs placeholder does not — catches a broken npm
          # build step that would otherwise ship a placeholder binary.
          if ! grep -q 'id="app"' frontend/dist/index.html; then
            echo "::error ::frontend/dist/index.html is a placeholder — npm build did not run"
            exit 1
          fi
          SIZE=$(stat -c '%s' target/release/meshmon-service)
          echo "meshmon-service size: ${SIZE} bytes"
          # Sanity floor: a frontend-less meshmon-service is already
          # several MB; with the SPA it grows by the dist size.
          if [ "$SIZE" -lt 2000000 ]; then
            echo "::error ::meshmon-service is unexpectedly small: ${SIZE} bytes"
            exit 1
          fi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: meshmon-service-linux-x86_64
          path: target/release/meshmon-service
          retention-days: 14

  rust-e2e:
    name: Rust E2E (bundled compose smoke)
    runs-on: ubuntu-latest
    needs: rust-lint
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"

      - name: Install system deps (mold linker, argon2 CLI)
        run: sudo apt-get update && sudo apt-get install -y mold argon2

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
          shared-key: meshmon-debug
          cache-on-failure: true

      - name: Stage deploy/.env
        working-directory: deploy
        run: |
          cp .env.example .env
          # Deterministic test credentials — match crates/e2e/src/lib.rs defaults.
          ADMIN_HASH=$(printf 'e2e-password' | argon2 "$(openssl rand -base64 16)" -id -t 2 -m 19 -p 1 -e)
          # Compose interpolates '$' in .env values, so Argon2's '$'
          # separators need to be doubled before they land in the file.
          ADMIN_HASH_ESCAPED=${ADMIN_HASH//\$/\$\$}
          sed -i \
            -e "s|^MESHMON_ADMIN_PASSWORD_HASH=.*|MESHMON_ADMIN_PASSWORD_HASH=${ADMIN_HASH_ESCAPED}|" \
            -e 's|^MESHMON_AGENT_TOKEN=.*|MESHMON_AGENT_TOKEN=e2e-token-0123456789abcdef|' \
            -e 's|^MESHMON_PG_PASSWORD=.*|MESHMON_PG_PASSWORD=e2e-pg|' \
            -e 's|^MESHMON_PG_GRAFANA_PASSWORD=.*|MESHMON_PG_GRAFANA_PASSWORD=e2e-pg-grafana|' \
            .env
          cp meshmon.example.toml meshmon.toml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR (read-only; enables registry cache-from)
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify docker compose supports bake
        run: |
          ver=$(docker compose version --short)
          echo "compose version: $ver"
          printf '%s\n' "$ver" "2.34.0" | sort -V | head -1 | grep -qx "2.34.0" || {
            echo "::error ::compose $ver < 2.34.0; COMPOSE_BAKE unsupported"
            exit 1
          }

      - name: cargo xtask test-e2e
        env:
          COMPOSE_BAKE: "true"
          # Layer the GHA buildx cache backend on top of the base
          # compose file. The overlay must not be used locally (needs
          # ACTIONS_RUNTIME_TOKEN) — see deploy/docker-compose.ci-cache.yml.
          MESHMON_E2E_CACHE_OVERLAY: deploy/docker-compose.ci-cache.yml
        run: cargo xtask test-e2e

      - name: Dump compose logs on failure
        if: failure()
        working-directory: deploy
        run: docker compose logs --no-color > ../compose-logs.txt

      - name: Upload compose logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-logs
          path: compose-logs.txt

      - name: Tear down
        if: always()
        working-directory: deploy
        run: docker compose down -v
