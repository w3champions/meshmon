name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (check, clippy, test, fmt, openapi drift)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94"
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --workspace --all-targets

      - name: regenerate OpenAPI snapshot
        run: cargo xtask openapi

      - name: verify OpenAPI snapshot is up to date
        run: |
          if ! git diff --exit-code frontend/src/api/openapi.json; then
            echo "::error ::frontend/src/api/openapi.json is stale — run 'cargo xtask openapi' and commit the result"
            exit 1
          fi

  frontend:
    name: Frontend (biome, type-check, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: npm ci
        run: npm ci

      - name: biome check
        run: npx biome check ./src

      - name: type-check
        run: npm run type-check

      - name: npm run build
        run: npm run build
