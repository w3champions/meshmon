name: release

# Production releases from main are gated on ci.yml passing first:
# the workflow_run trigger fires when ci completes, and the build job
# below requires conclusion == 'success'. Tag pushes (v*) keep the
# direct push trigger because tags reference SHAs that already passed
# ci on main. workflow_dispatch is the intentional emergency-bypass
# path — it skips Trivy scan and produces dispatch-<sha> tags only
# (no `latest` / `main-<sha>` promotion).
on:
  push:
    tags: ['v*']
  workflow_dispatch:
  workflow_run:
    workflows: [ci]
    types: [completed]
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # Per-arch builds on native runners — no QEMU. Each build pushes a
  # digest-only image (no tags) so the Trivy gate can scan the exact
  # bytes before any tag is created by the merge job below.
  build:
    name: Build ${{ matrix.image.name }} (${{ matrix.platform }})
    # Skip cleanly when ci.yml (the workflow_run upstream) failed —
    # tag pushes and workflow_dispatch are unaffected.
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: meshmon-service
            dockerfile: docker/Dockerfile.service
            context: .
          - name: meshmon-agent
            dockerfile: docker/Dockerfile.agent
            context: .
          - name: meshmon-grafana
            dockerfile: docker/Dockerfile.grafana
            context: .
          - name: meshmon-vmalert
            dockerfile: docker/Dockerfile.vmalert
            context: .
          - name: meshmon-alertmanager
            dockerfile: docker/Dockerfile.alertmanager
            context: .
        platform:
          - linux/amd64
          - linux/arm64
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    env:
      REGISTRY_IMAGE: ghcr.io/w3champions/${{ matrix.image.name }}
    steps:
      # Pin ref explicitly: under workflow_run the default checkout
      # would resolve refs/heads/main HEAD, which can advance between
      # ci finishing and release starting. head_sha is the exact SHA
      # ci validated.
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Derive platform-pair slug
        env:
          PLATFORM: ${{ matrix.platform }}
        run: echo "PLATFORM_PAIR=${PLATFORM//\//-}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: |
            type=registry,ref=${{ env.REGISTRY_IMAGE }}:buildcache-${{ env.PLATFORM_PAIR }}
            type=gha,scope=${{ matrix.image.name }}-${{ env.PLATFORM_PAIR }}
          cache-to: |
            type=registry,ref=${{ env.REGISTRY_IMAGE }}:buildcache-${{ env.PLATFORM_PAIR }},mode=max,image-manifest=true
            type=gha,scope=${{ matrix.image.name }}-${{ env.PLATFORM_PAIR }},mode=max
          provenance: false

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image.name }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Scan the amd64 digest produced by `build` before any tag is created.
  # Arch-invariant for our base images, so a single-arch scan is enough.
  # workflow_dispatch runs produce dispatch-<sha> tags that are not
  # production-promoted; Trivy scanning is deliberately skipped there
  # (the merge job treats a skipped scan as non-blocking).
  scan:
    name: Trivy scan ${{ matrix.image }}
    needs: build
    # Production-promoted releases (workflow_run from main, or v* tag
    # push) require a clean Trivy gate. workflow_dispatch is exempt by
    # design — see merge job comment.
    if: >-
      github.event_name == 'workflow_run' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [meshmon-service, meshmon-agent, meshmon-grafana, meshmon-vmalert, meshmon-alertmanager]
    steps:
      # Checkout so Trivy can read `.trivyignore.yaml` from the workspace.
      # Without this the scan job runs with an empty $GITHUB_WORKSPACE and
      # the ignore file is silently absent (auto-discovery fails, VEX
      # statements get ignored). Pin ref same as build job.
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Download amd64 digest
        uses: actions/download-artifact@v4
        with:
          name: digests-${{ matrix.image }}-linux-amd64
          path: /tmp/digest

      # Digest-only images pushed by `build` land in a private GHCR
      # package until `merge` attaches public tags. Trivy must
      # authenticate to pull them; without this step the pull fails
      # with `UNAUTHORIZED` and the gate never runs.
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve digest ref
        id: ref
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(/tmp/digest/*)
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::no digest artifact present for ${{ matrix.image }}"
            exit 1
          fi
          digest=$(basename "${files[0]}")
          echo "image=ghcr.io/w3champions/${{ matrix.image }}@sha256:${digest}" >> "$GITHUB_OUTPUT"

      - name: Run Trivy scan (amd64 only — arch-invariant for our base images)
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          TRIVY_PLATFORM: linux/amd64
        with:
          image-ref: ${{ steps.ref.outputs.image }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
          vuln-type: os,library
          trivyignores: .trivyignore.yaml

      - name: Trivy scan (SARIF forensics)
        uses: aquasecurity/trivy-action@v0.35.0
        if: always()
        env:
          TRIVY_PLATFORM: linux/amd64
        with:
          image-ref: ${{ steps.ref.outputs.image }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: '0'
          trivyignores: .trivyignore.yaml

      - name: Upload Trivy SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-${{ matrix.image }}
          path: trivy-${{ matrix.image }}.sarif
          retention-days: 90

  # Stitch the per-arch digests into a multi-arch manifest list and
  # attach the production tags. Runs only after `scan` succeeds (or is
  # skipped for workflow_dispatch) so CRITICAL findings block tag
  # promotion instead of chasing already-live tags.
  merge:
    name: Merge manifest ${{ matrix.image }}
    needs: [build, scan]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.scan.result == 'success' || needs.scan.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        image: [meshmon-service, meshmon-agent, meshmon-grafana, meshmon-vmalert, meshmon-alertmanager]
    env:
      REGISTRY_IMAGE: ghcr.io/w3champions/${{ matrix.image }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          # The `:latest` and `:main-<sha>` raw tags are gated on the
          # workflow_run trigger (i.e. ci.yml succeeded on main) so a
          # workflow_dispatch run from main cannot bypass the scan
          # gate and overwrite production tags — scan is skipped for
          # workflow_dispatch by design. Dispatch runs still emit
          # `dispatch-<short-sha>` as the non-production fallback.
          # `main-<sha>` uses the ci-validated head_sha so the tag
          # matches the SHA that ran through ci, even if main has
          # advanced before release fires.
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_run' }}
            type=raw,value=main-${{ github.event.workflow_run.head_sha || github.sha }},enable=${{ github.event_name == 'workflow_run' }}
            type=semver,pattern=v{{version}}
            type=sha,prefix=dispatch-,format=short,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Create manifest list and push
        shell: bash
        run: |
          set -euo pipefail
          shopt -s failglob

          mapfile -t tags < <(jq -r '.tags[]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          tag_args=()
          for t in "${tags[@]}"; do
            tag_args+=(-t "$t")
          done

          source_args=()
          for f in /tmp/digests/*; do
            digest=$(basename "$f")
            source_args+=("${REGISTRY_IMAGE}@sha256:${digest}")
          done

          docker buildx imagetools create "${tag_args[@]}" "${source_args[@]}"

      - name: Inspect manifest
        run: docker buildx imagetools inspect ${{ env.REGISTRY_IMAGE }}:${{ steps.meta.outputs.version }}

  trigger-azure-release:
    name: Trigger Azure DevOps Release
    needs: [merge]
    runs-on: ubuntu-latest
    # Fires for production-promoted releases only: workflow_run from
    # main (the ci-passed path) and v* tag pushes. workflow_dispatch
    # is excluded — those produce dispatch-<sha> images that should
    # not enter the Azure release pipeline.
    if: |
      github.event_name == 'workflow_run' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Derive tag
        id: tag
        env:
          # head_sha is the ci-validated SHA when triggered by
          # workflow_run; for tag pushes GITHUB_SHA is correct.
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "value=main-${HEAD_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: POST release creation to Azure DevOps
        env:
          AZDO_PAT: ${{ secrets.AZDO_RELEASE_PAT }}
          AZDO_ORG: w3champions
          AZDO_PROJECT: w3champions
          # Fill in after the Azure Release pipeline is created in the UI.
          # The definition ID is visible in the Release pipeline URL:
          # https://dev.azure.com/w3champions/w3champions/_release?definitionId=<ID>
          AZDO_RELEASE_DEFINITION_ID: ${{ vars.AZDO_MESHMON_RELEASE_DEFINITION_ID }}
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          set -euo pipefail
          # Required setup is deliberately load-bearing: a missing
          # secret or variable fails the workflow so the operator sees
          # the misconfiguration immediately on the first push after
          # wiring up the pipeline.
          if [ -z "${AZDO_PAT}" ]; then
            echo "::error::AZDO_RELEASE_PAT secret not configured; cannot trigger Azure DevOps Release."
            exit 1
          fi
          if [ -z "${AZDO_RELEASE_DEFINITION_ID}" ]; then
            echo "::error::AZDO_MESHMON_RELEASE_DEFINITION_ID variable not configured; cannot trigger Azure DevOps Release."
            exit 1
          fi
          AUTH=$(printf ":%s" "$AZDO_PAT" | base64 -w0)
          echo "::add-mask::$AUTH"
          BODY=$(jq -n \
            --arg defId "$AZDO_RELEASE_DEFINITION_ID" \
            --arg tag "$TAG" \
            '{
              definitionId: ($defId | tonumber),
              description: ("Triggered by meshmon release.yml for tag " + $tag),
              variables: { TAG: { value: $tag, isSecret: false } }
            }')
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Basic $AUTH" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "https://vsrm.dev.azure.com/${AZDO_ORG}/${AZDO_PROJECT}/_apis/release/releases?api-version=7.1"
