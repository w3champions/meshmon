name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & publish meshmon images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: meshmon-service
            dockerfile: docker/Dockerfile.service
            context: .
          - image: meshmon-agent
            dockerfile: docker/Dockerfile.agent
            context: .
          - image: meshmon-grafana
            dockerfile: docker/Dockerfile.grafana
            context: .
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/w3champions/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main-${{ github.sha }},enable={{is_default_branch}}
            type=semver,pattern=v{{version}}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/w3champions/${{ matrix.image }}:buildcache-amd64
            type=registry,ref=ghcr.io/w3champions/${{ matrix.image }}:buildcache-arm64
          cache-to: |
            type=registry,ref=ghcr.io/w3champions/${{ matrix.image }}:buildcache-amd64,mode=max,image-manifest=true
            type=registry,ref=ghcr.io/w3champions/${{ matrix.image }}:buildcache-arm64,mode=max,image-manifest=true
          provenance: false
