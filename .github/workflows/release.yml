name: release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Build & publish meshmon images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: meshmon-service
            dockerfile: docker/Dockerfile.service
            context: .
          - image: meshmon-agent
            dockerfile: docker/Dockerfile.agent
            context: .
          - image: meshmon-grafana
            dockerfile: docker/Dockerfile.grafana
            context: .
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU (arm64 emulation)
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/w3champions/${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=main-${{ github.sha }},enable={{is_default_branch}}
            type=semver,pattern=v{{version}}
            # workflow_dispatch fallback: emits dispatch-<short-sha> so
            # manual runs from any branch still produce at least one tag.
            type=sha,prefix=dispatch-,format=short,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=registry,ref=ghcr.io/w3champions/${{ matrix.image }}:buildcache-amd64
            type=registry,ref=ghcr.io/w3champions/${{ matrix.image }}:buildcache-arm64
          cache-to: |
            type=registry,ref=ghcr.io/w3champions/${{ matrix.image }}:buildcache-amd64,mode=max,image-manifest=true
            type=registry,ref=ghcr.io/w3champions/${{ matrix.image }}:buildcache-arm64,mode=max,image-manifest=true
          provenance: false

  # scan runs after publish; :latest + :main-<sha> and :v<ver> are
  # already live in GHCR by the time this gate fires. Failures block
  # promotion decisions, not the push itself.
  scan:
    name: Trivy image scan
    needs: publish
    permissions:
      contents: read
      packages: read
    # workflow_dispatch runs produce `dispatch-<sha>` tags that are not
    # production-promoted; Trivy scanning is deliberately skipped for those.
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [meshmon-service, meshmon-agent, meshmon-grafana]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Trivy scan (amd64 only — arch-invariant for our base images)
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          TRIVY_PLATFORM: linux/amd64
        with:
          # On main push: scan the :main-<sha> immutable tag just published.
          # On v* tag push: scan the :v<ver> tag just published.
          image-ref: >-
            ghcr.io/w3champions/${{ matrix.image }}:${{
              github.ref_type == 'tag' && github.ref_name ||
              format('main-{0}', github.sha)
            }}
          format: table
          exit-code: '1'
          severity: CRITICAL
          ignore-unfixed: true
          vuln-type: os,library

      - name: Trivy scan (SARIF forensics)
        uses: aquasecurity/trivy-action@v0.35.0
        if: always()
        env:
          TRIVY_PLATFORM: linux/amd64
        with:
          image-ref: >-
            ghcr.io/w3champions/${{ matrix.image }}:${{
              github.ref_type == 'tag' && github.ref_name ||
              format('main-{0}', github.sha)
            }}
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os,library
          exit-code: '0'

      - name: Upload Trivy SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-sarif-${{ matrix.image }}
          path: trivy-${{ matrix.image }}.sarif
          retention-days: 90
