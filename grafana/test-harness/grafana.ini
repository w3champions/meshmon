# Minimal grafana.ini for the meshmon smoke harness.
# Production operators configure their own; this file exists so the harness
# starts with known-safe defaults.

[server]
http_port = 3000
serve_from_sub_path = false

[security]
# Required for the /d-solo iframe embedding flow the meshmon frontend uses.
# Production operators must set this too — document in grafana/README.md.
allow_embedding = true

[users]
allow_sign_up = false
default_theme = dark

[log]
level = warn
