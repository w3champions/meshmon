# grafana.ini for the meshmon dashboards smoke harness.
#
# Runs Grafana in the same `auth.proxy` mode meshmon operators ship
# in production, so the harness exercises the same auth path.

[server]
http_port = 3000
serve_from_sub_path = true
root_url = %(protocol)s://%(domain)s/grafana/

[auth]
disable_login_form = true
disable_signout_menu = true

[auth.anonymous]
enabled = false

[auth.proxy]
enabled = true
header_name = X-WEBAUTH-USER
header_property = username
auto_sign_up = true
sync_ttl = 60
# Empty whitelist disables the IP filter entirely — the smoke loop
# curls Grafana from the docker host, so the request arrives over
# the docker bridge (not 127.0.0.1 from the container's POV) and we
# don't try to nail down the bridge CIDR. Production sets a narrow
# value scoped to meshmon-service's container IP.
whitelist =
enable_login_token = false

[security]
allow_embedding = true
cookie_samesite = lax

[users]
allow_sign_up = false
default_theme = dark

[log]
level = warn
