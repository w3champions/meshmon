# grafana/test-harness/docker-compose.yml — throwaway VM + Grafana stack for
# validating meshmon's dashboards + datasource provisioning in isolation.
#
# Usage: scripts/smoke-dashboards.sh handles lifecycle. Binds to 127.0.0.1
# only; no persistence.
name: meshmon-dashboards-smoke
services:
  meshmon-vm:
    image: victoriametrics/victoria-metrics:${VM_TAG}
    container_name: meshmon-vm-smoke
    command:
      - "-retentionPeriod=1d"
      - "-storageDataPath=/vm-data"
    ports:
      - "127.0.0.1:8428:8428"
    tmpfs:
      - /vm-data
    networks: [smoke]

  meshmon-grafana:
    image: grafana/grafana-oss:${GRAFANA_TAG}
    container_name: meshmon-grafana-smoke
    depends_on:
      - meshmon-vm
    environment:
      GF_SECURITY_ADMIN_USER: "admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_LOG_LEVEL: "warn"
    volumes:
      - ./grafana.ini:/etc/grafana/grafana.ini:ro
      - ./provisioning:/etc/grafana/provisioning:ro
      - ../dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3000:3000"
    networks: [smoke]

networks:
  smoke:
    driver: bridge
