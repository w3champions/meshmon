# lefthook.yml — developer pre-commit hooks. Opt-in: install with
# `lefthook install` once per clone. CI is the authoritative backstop;
# these hooks catch fast-feedback issues (formatting, obvious lint)
# without running the full test suite on every commit.
#
# Config sources mirror CI (see .github/workflows/ci.yml):
#   cargo fmt        → rustfmt defaults (no project rustfmt.toml)
#   biome check      → frontend/biome.json
#   yamllint         → .yamllint.yml
#   shellcheck       → CLI flags only (no .shellcheckrc today)
#   actionlint       → no config
#
# Nothing here duplicates a CI config file; every tool reads the same
# source both locally and on GitHub.

pre-commit:
  parallel: true
  commands:
    rustfmt:
      # Runs on any .rs diff; cargo fmt --all checks the whole workspace (fast, no per-file pre-filter needed).
      glob: "**/*.rs"
      run: cargo fmt --all -- --check
      stage_fixed: false

    biome:
      # Scoped to frontend/src/** because biome.json lives under frontend/ and only covers frontend TS/JS/JSON.
      # Requires `npm ci` to have run in frontend/.
      root: "frontend/"
      glob: "src/**/*.{ts,tsx,js,jsx,json}"
      run: npx biome check --no-errors-on-unmatched {staged_files}

    yamllint:
      # Scoped to deploy/ to match the CI yamllint job's scope; other YAML is covered by actionlint or has no applicable schema.
      glob: "deploy/**/*.{yml,yaml}"
      run: yamllint -c .yamllint.yml {staged_files}

    shellcheck:
      # Scoped to scripts/ to match the CI shellcheck job's scope; ad-hoc scripts belong in a separate PR.
      glob: "scripts/*.sh"
      run: shellcheck --severity=warning {staged_files}

    actionlint:
      # Scoped to .github/workflows/ because that's where workflows live (matches CI's actionlint job).
      glob: ".github/workflows/*.{yml,yaml}"
      run: actionlint {staged_files}

pre-push:
  commands:
    cargo-check:
      glob: "**/*.rs"
      run: cargo check --workspace --all-targets
      # Last-line defense before pushing. Only fires when a .rs file
      # is in the pushed diff; frontend-only pushes skip this entirely.
