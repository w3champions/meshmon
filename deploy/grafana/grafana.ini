# deploy/grafana/grafana.ini — baked into ghcr.io/w3champions/meshmon-grafana
# by docker/Dockerfile.grafana. Operates in `auth.proxy` mode: the
# meshmon-service /grafana/* reverse proxy validates the operator
# session and injects X-WEBAUTH-USER. Grafana trusts that header only
# when the upstream peer is in the whitelist below — meshmon-service's
# static IP on the meshmon-internal bridge.

[server]
http_port = 3000
serve_from_sub_path = true
root_url = %(protocol)s://%(domain)s/grafana/

[auth]
disable_login_form = true
disable_signout_menu = true

[auth.anonymous]
enabled = false

[auth.proxy]
enabled = true
header_name = X-WEBAUTH-USER
header_property = username
auto_sign_up = true
sync_ttl = 60
# 172.30.0.10 = meshmon-service static IP on meshmon-internal (see
# deploy/docker-compose.yml networks.meshmon-internal.ipam).
whitelist = 172.30.0.10
enable_login_token = false

[security]
allow_embedding = true
cookie_samesite = lax

[users]
allow_sign_up = false
default_theme = dark

[log]
level = warn
