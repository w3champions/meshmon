# meshmon-service runtime configuration.
#
# All settings below are read by the service at startup. SIGHUP causes the
# service to re-read this file and broadcast updates through its in-memory
# ArcSwap; auth users and bind addresses are NOT hot-reloadable — for those
# changes, restart the service.
#
# Secrets (database URL, agent shared token) can be provided inline here or
# indirected through env vars via the sibling `*_env` key, which holds the
# name of an environment variable containing the real value.

[service]
# Axum listen address.
listen_addr = "0.0.0.0:8080"

# Optional. Used by the service to emit absolute URLs in API responses. When
# running behind nginx-proxy, set this to the externally-visible origin.
# public_base_url = "https://meshmon.example.com"

# Graceful-shutdown deadline. After SIGTERM the service flips /readyz to 503
# and lets axum drain in-flight requests. Workers that don't exit within this
# window are aborted. Keep tight so pod rollouts are snappy.
shutdown_deadline_seconds = 5

# Trust `X-Forwarded-For` / `Forwarded` for client-IP extraction. Set `true`
# when running behind an nginx reverse proxy that sets these headers; leave
# `false` for direct exposure. A misconfigured `true` lets attackers bypass
# the per-IP login rate limit by forging the header.
# trust_forwarded_headers = false

[database]
# Either `url` or `url_env` must be set.
# url = "postgres://meshmon:SECRET@meshmon-db:5432/meshmon?sslmode=disable"
url_env = "MESHMON_POSTGRES_URL"

[logging]
# Env filter; overridden by $RUST_LOG when set. Changes here take effect on
# service restart — the tracing subscriber is installed once at startup and
# does not re-read the filter on SIGHUP.
filter = "info"
# "json" for production (one object per line, fields flattened) or "compact"
# for developer terminals. Restart-only, same reason as `filter`.
format = "json"

[auth]
# Zero or more operator accounts — username + PHC-format argon2 hash.
#
# Generate a hash offline with the argon2 CLI:
#
#   echo -n "plaintext" | argon2 <saltfile> -id -e
#
# Plaintext passwords must never land in this file; only the PHC string does.
#
# Login is brute-force-protected: 5 attempts per 15 minutes per IP, burst of
# 3. On lockout the endpoint returns 429. Sessions use a `meshmon_session`
# cookie (Secure, HttpOnly, SameSite=Lax, 30-day rolling expiry). Editing
# this list requires a full service restart — SIGHUP does NOT rotate
# session material.
# [[auth.users]]
# username = "admin"
# password_hash = "$argon2id$v=19$m=19456,t=2,p=1$..."

[agent_api]
# Single shared bearer token for agent authentication. Either inline or via
# env var; leave both unset to disable agent endpoints (they return 503).
# shared_token = "paste-the-token-here"
shared_token_env = "MESHMON_AGENT_TOKEN"

[upstream]
# VictoriaMetrics remote-write target and query endpoint. Unreachability at
# startup logs a warning — the service still boots so operators can inspect
# state and repair the upstream.
# vm_url = "http://meshmon-vm:8428"

# Alertmanager API base URL. Same reachability-is-advisory semantics.
# alertmanager_url = "http://meshmon-alertmanager:9093"
