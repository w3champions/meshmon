# meshmon-service runtime configuration.
#
# All settings below are read by the service at startup. SIGHUP causes the
# service to re-read this file and broadcast updates through its in-memory
# ArcSwap; auth users and bind addresses are NOT hot-reloadable — for those
# changes, restart the service.
#
# Secrets (database URL, agent shared token) can be provided inline here or
# indirected through env vars via the sibling `*_env` key, which holds the
# name of an environment variable containing the real value.

[service]
# Axum listen address.
listen_addr = "0.0.0.0:8080"

# Optional. Used by the service to emit absolute URLs in API responses. When
# running behind nginx-proxy, set this to the externally-visible origin.
# public_base_url = "https://meshmon.example.com"

# Graceful-shutdown deadline. After SIGTERM the service flips /readyz to 503
# and lets axum drain in-flight requests. Workers that don't exit within this
# window are aborted. Keep tight so pod rollouts are snappy.
shutdown_deadline_seconds = 5

# Trust `X-Forwarded-For` / `Forwarded` for client-IP extraction. Set `true`
# when running behind an nginx reverse proxy that sets these headers; leave
# `false` for direct exposure. A misconfigured `true` lets attackers bypass
# the per-IP login rate limit by forging the header.
# trust_forwarded_headers = false

# Optional: HTTP Basic auth for /metrics (defense-in-depth for the
# Prometheus scrape). Unset → /metrics is unauthenticated (spec
# default). When set, both username and one of {password_hash,
# password_hash_env} are required.
#
# [service.metrics_auth]
# username = "prometheus"
# password_hash_env = "MESHMON_METRICS_PASSWORD_HASH"
# # Generate a production-strength PHC hash with the argon2 CLI. `-id`
# # selects argon2id; `-t 2 -p 1` are the OWASP-recommended iteration
# # and parallelism; `-m 19` is a base-2 log — 2^19 KiB = 512 MiB memory
# # per verify. Lower to `-m 17` (128 MiB) on memory-constrained hosts.
# #
# #   echo -n "$PASSWORD" | argon2 "$(openssl rand -base64 16)" -id -t 2 -m 19 -p 1 -e

[database]
# Either `url` or `url_env` must be set.
# url = "postgres://meshmon:SECRET@meshmon-db:5432/meshmon?sslmode=disable"
url_env = "MESHMON_POSTGRES_URL"

[logging]
# Env filter; overridden by $RUST_LOG when set. Changes here take effect on
# service restart — the tracing subscriber is installed once at startup and
# does not re-read the filter on SIGHUP.
filter = "info"
# "json" for production (one object per line, fields flattened) or "compact"
# for developer terminals. Restart-only, same reason as `filter`.
format = "json"

[auth]
# Zero or more operator accounts — username + PHC-format argon2 hash.
#
# Generate a hash offline with the argon2 CLI:
#
#   echo -n "plaintext" | argon2 <saltfile> -id -e
#
# Plaintext passwords must never land in this file; only the PHC string does.
#
# Login is brute-force-protected: 5 attempts per 15 minutes per IP, burst of
# 3. On lockout the endpoint returns 429. Sessions use a `meshmon_session`
# cookie (Secure, HttpOnly, SameSite=Lax, 30-day rolling expiry). Editing
# this list requires a full service restart — SIGHUP does NOT rotate
# session material.
# [[auth.users]]
# username = "admin"
# password_hash = "$argon2id$v=19$m=19456,t=2,p=1$..."

[agent_api]
# Single shared bearer token for agent authentication. Either inline or via
# env var; leave both unset to disable agent endpoints (they return 503).
# shared_token = "paste-the-token-here"
shared_token_env = "MESHMON_AGENT_TOKEN"

# Per-IP rate limit on the agent gRPC service. Tuned for register + config +
# targets startup bursts + steady-state ~1 req/minute per agent.
# rate_limit_per_minute = 60
# rate_limit_burst = 30

# Standalone TLS (no proxy in front). Leave this block commented when the
# service runs behind nginx-proxy — the proxy terminates TLS and forwards
# plaintext gRPC via `grpc_pass`.
# [agent_api.tls]
# cert_path = "/etc/meshmon/tls/fullchain.pem"
# key_path  = "/etc/meshmon/tls/privkey.pem"

[upstream]
# VictoriaMetrics remote-write target and query endpoint. Unreachability at
# startup logs a warning — the service still boots so operators can inspect
# state and repair the upstream.
# vm_url = "http://meshmon-vm:8428"

# Alertmanager API base URL. Same reachability-is-advisory semantics.
# alertmanager_url = "http://meshmon-alertmanager:9093"

[agents]
# Minutes after last_seen_at before an agent is no longer counted as active.
# target_active_window_minutes = 5

# How often the in-memory registry snapshot is re-read from Postgres.
# refresh_interval_seconds = 10

# ---------------------------------------------------------------------------
# [probing] — probing configuration broadcast to agents via GetConfig.
#
# The `udp_probe_secret` field is REQUIRED. All other fields are optional
# and fall back to the compiled-in defaults (see
# crates/service/src/probing.rs `Default for ProbingSection`). SIGHUP
# reloads this section through the ArcSwap without a service restart.

[probing]
# Shared 8-byte secret embedded in UDP probe packets. Peers drop traffic
# that does not match. Encoded as hex: or base64: with an 8-byte payload.
# Rotate by moving the outgoing value to `udp_probe_previous_secret` and
# setting a new `udp_probe_secret`; listeners accept either during the
# rotation window.
udp_probe_secret = "hex:0011223344556677"
# udp_probe_previous_secret = "hex:ffeeddccbbaa9988"

# Protocols agents are permitted to use. Any protocol omitted here is
# disabled regardless of `priority`.
# enabled_protocols = ["icmp", "tcp", "udp"]
#
# Preference order for selecting the primary protocol. Must be a subset of
# `enabled_protocols`. First protocol with healthy status becomes primary.
# priority = ["icmp", "tcp", "udp"]
#
# Per-protocol state-machine thresholds: loss fractions and hysteresis
# windows that control transitions between healthy and unhealthy states.
# All *_pct values are fractions in [0.0, 1.0]; *_sec values must be > 0.
#
# [probing.icmp_thresholds]
# unhealthy_trigger_pct   = 0.90
# healthy_recovery_pct    = 0.10
# unhealthy_hysteresis_sec = 30
# healthy_hysteresis_sec   = 60
#
# [probing.tcp_thresholds]
# unhealthy_trigger_pct   = 0.50
# healthy_recovery_pct    = 0.05
# unhealthy_hysteresis_sec = 30
# healthy_hysteresis_sec   = 60
#
# [probing.udp_thresholds]
# unhealthy_trigger_pct   = 0.90
# healthy_recovery_pct    = 0.10
# unhealthy_hysteresis_sec = 30
# healthy_hysteresis_sec   = 60
#
# Rolling-window sizes used when evaluating per-protocol health.
# [probing.windows]
# primary_sec   = 300
# diversity_sec = 900
#
# Route-change diff-detection thresholds. `*_freq` values are [0.0, 1.0]
# observation fractions; `hop_count_change` is an absolute hop count;
# `rtt_shift_frac` is a relative RTT change fraction.
# [probing.diff_detection]
# new_ip_min_freq      = 0.20
# missing_ip_max_freq  = 0.05
# hop_count_change     = 1
# rtt_shift_frac       = 0.50
#
# Path-level health state-machine thresholds.
# [probing.path_health_thresholds]
# degraded_trigger_pct  = 0.05
# degraded_trigger_sec  = 120
# degraded_min_samples  = 30
# normal_recovery_pct   = 0.02
# normal_recovery_sec   = 300
#
# Probe-rate table: one entry per (primary_protocol, path_health) pair.
# When any [[probing.rates]] entry is provided, ALL combinations of
# priority × {normal, degraded, unreachable} must be present.
# If this section is omitted entirely, the compiled-in default matrix
# (9 entries for icmp/tcp/udp × normal/degraded/unreachable) is used.
#
# [[probing.rates]]
# primary   = "icmp"
# health    = "normal"
# icmp_pps  = 0.20
# tcp_pps   = 0.05
# udp_pps   = 0.05
#
# # ... repeat for every (primary, health) combination in your priority list
