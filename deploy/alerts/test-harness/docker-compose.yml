# Throw-away end-to-end alert dispatch harness.
#
# Usage: ./scripts/smoke-alerts.sh
#
# NOT intended for production. NOT merged with deploy/docker-compose.yml.
# Tags come from deploy/versions.env — run via scripts/smoke-alerts.sh, or
# pass --env-file deploy/versions.env to any direct `docker compose`
# invocation. Image tags intentionally have no defaults so compose errors
# loudly when --env-file is missing.

services:
  vm:
    image: victoriametrics/victoria-metrics:${VM_TAG}
    container_name: meshmon-harness-vm
    command:
      - "-retentionPeriod=1d"
      - "-promscrape.suppressScrapeErrors"
    ports:
      - "127.0.0.1:8428:8428"

  vmalert:
    image: victoriametrics/vmalert:${VMALERT_TAG}
    container_name: meshmon-harness-vmalert
    depends_on: [vm, alertmanager]
    command:
      - "-datasource.url=http://vm:8428"
      - "-notifier.url=http://alertmanager:9093"
      - "-rule=/rules/rules.yaml"
      - "-evaluationInterval=10s"
    volumes:
      - ../rules.yaml:/rules/rules.yaml:ro

  alertmanager:
    image: prom/alertmanager:${ALERTMANAGER_TAG}
    container_name: meshmon-harness-am
    depends_on: [webhook-sink]
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/tmp/am"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "127.0.0.1:9093:9093"

  webhook-sink:
    build: ./webhook-sink
    container_name: meshmon-harness-sink
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:18080:8080"
